<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storage</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/streamsaver@2.0.6/StreamSaver.min.js"></script>
<style>
:root {
  --bg:     #080808;
  --bg1:    #0d0d0d;
  --bg2:    #111;
  --b1:     #1c1c1c;
  --b2:     #242424;
  --green:  #00ff41;
  --green2: #00c832;
  --green3: #003d10;
  --amber:  #ffb300;
  --red:    #ff3333;
  --dim:    #2a2a2a;
  --dim2:   #1a1a1a;
  --text:   #c8c8c8;
  --text2:  #555;
  --text3:  #333;
  --font:   'JetBrains Mono', monospace;
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:var(--bg); color:var(--text);
  font-family:var(--font); font-size:12px;
  min-height:100vh;
}
body::after {
  content:''; position:fixed; inset:0; pointer-events:none; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.055) 2px,rgba(0,0,0,0.055) 4px);
}

/* HEADER */
.hdr {
  display:flex; align-items:center; justify-content:flex-end;
  padding:8px 14px; border-bottom:1px solid var(--b2);
  background:var(--bg1); gap:10px;
}
.clock { color:var(--text2); font-size:10px; letter-spacing:1px; }
.dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--green); box-shadow:0 0 6px var(--green);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* TABS */
.tabs { display:flex; border-bottom:1px solid var(--b2); background:var(--bg1); padding:0 14px; }
.tab {
  padding:8px 16px; cursor:pointer; color:var(--text2);
  font-family:var(--font); font-size:11px; letter-spacing:1.5px;
  text-transform:uppercase; border-bottom:2px solid transparent;
  transition:color .12s, border-color .12s; user-select:none;
}
.tab:hover { color:var(--text); }
.tab.active { color:var(--green); border-bottom-color:var(--green); }
.panel { display:none; padding:13px 14px; }
.panel.active { display:block; }

/* PROMPT */
.prompt { display:flex; align-items:center; gap:7px; color:var(--text2); font-size:11px; margin-bottom:9px; }
.prompt-sym { color:var(--green); }
.prompt-path { color:var(--text3); }

/* DROP */
.drop {
  border:1px solid var(--b2); padding:26px 20px; text-align:center;
  cursor:pointer; position:relative; margin-bottom:10px;
  background:var(--bg1); transition:all .12s;
}
.drop::before {
  content:''; position:absolute; inset:3px;
  border:1px dashed var(--dim); pointer-events:none; transition:border-color .12s;
}
.drop:hover,.drop.drag { background:#0a0f0a; border-color:var(--green3); }
.drop:hover::before,.drop.drag::before { border-color:var(--green2); }
.drop input { position:absolute; inset:0; opacity:0; cursor:pointer; }
.drop-ico { font-size:20px; margin-bottom:5px; }
.drop h3 { font-size:11px; color:var(--text); letter-spacing:1px; margin-bottom:2px; }
.drop p  { font-size:10px; color:var(--text3); }

/* BUTTONS */
button {
  background:var(--bg2); border:1px solid var(--dim);
  color:var(--text2); font-family:var(--font); font-size:11px;
  padding:5px 11px; cursor:pointer; letter-spacing:.5px; transition:all .1s;
}
button:hover:not(:disabled) { border-color:var(--green2); color:var(--green); }
button.pri { border-color:var(--green2); color:var(--green); }
button.pri:hover:not(:disabled) { background:var(--green3); }
button.red { border-color:#400; color:#633; }
button.red:hover:not(:disabled) { border-color:var(--red); color:var(--red); }
button:disabled { opacity:.25; cursor:default; }
.brow { display:flex; gap:6px; flex-wrap:wrap; }

/* PROGRESS */
.pw { display:none; margin:8px 0; }
.pw.on { display:block; }
.pbg { background:var(--bg2); height:3px; border:1px solid var(--b2); overflow:hidden; }
.pb  { background:var(--green); height:100%; width:0; transition:width .08s; box-shadow:0 0 6px rgba(0,255,65,.3); }
.pl  { color:var(--text3); font-size:10px; margin-top:3px; letter-spacing:.5px; }

/* LOG */
.log {
  background:var(--bg); border:1px solid var(--b2);
  padding:7px 10px; max-height:140px; overflow-y:auto;
  font-size:11px; line-height:1.9; margin-top:9px;
}
.log::-webkit-scrollbar { width:3px; }
.log::-webkit-scrollbar-thumb { background:var(--dim); }
.ok  { color:var(--green2); }
.er  { color:var(--red); }
.if  { color:#1a6a8a; }
.wn  { color:var(--amber); }

/* BADGE */
.badge { background:#0a120a; border:1px solid var(--green3); padding:6px 10px; margin-bottom:8px; display:none; font-size:11px; }
.badge.on { display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
.fn { color:var(--green); } .fs { color:var(--text3); }

/* STATS */
.stats4 { display:grid; grid-template-columns:repeat(4,1fr); gap:4px; margin-bottom:9px; }
.stat { background:var(--bg1); border:1px solid var(--b2); padding:6px 9px; }
.sl { color:var(--text3); font-size:9px; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:2px; }
.sv { color:var(--green); font-size:12px; }

/* FILE LIST */
.hist-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--b2);
}
.hist-title { color:var(--text3); font-size:10px; letter-spacing:2px; text-transform:uppercase; }
.hist-title::before { content:'~/'; color:var(--dim); }

.hist-empty {
  color:var(--dim); font-size:11px; text-align:center;
  padding:28px; border:1px solid var(--b2); background:var(--bg1);
}

.hist-list { border:1px solid var(--b2); }
.hist-item {
  display:grid; gap:8px; align-items:center;
  padding:8px 10px; border-bottom:1px solid var(--b2); transition:background .1s;
}
.hist-item:last-child { border-bottom:none; }
.hist-item:hover { background:var(--bg1); }
.hi-info { min-width:0; }
.hi-name { color:var(--text); font-size:12px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:280px; }
.hi-meta { color:var(--text3); font-size:10px; margin-top:2px; }
.hi-meta span { margin-right:10px; }
.hi-meta .mid { color:var(--dim); }
.hi-status { font-size:10px; padding:2px 6px; border:1px solid; white-space:nowrap; }
.hi-status.done { color:var(--green2); border-color:var(--green3); }
.hi-btn { font-size:10px; padding:4px 8px; white-space:nowrap; }
.hi-prog { display:none; margin-top:4px; }
.hi-prog.on { display:block; }
.hi-pbg { background:var(--bg2); height:2px; }
.hi-pb  { background:var(--green); height:100%; width:0; transition:width .08s; }
.hi-pl  { color:var(--text3); font-size:10px; margin-top:2px; }


input[type=text] { background:var(--bg2); border:1px solid var(--dim); color:var(--text); font-family:var(--font); font-size:11px; padding:5px 9px; outline:none; width:100%; }
input:focus { border-color:var(--green2); }
input::placeholder { color:var(--text3); }
</style>
</head>
<body>

<!-- HEADER: just clock + dot -->
<div class="hdr">
  <div class="clock" id="clock">--:--:--</div>
  <div class="dot"></div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="sw('files')">FILES</div>
  <div class="tab" onclick="sw('send')">UPLOAD</div>
</div>

<!-- FILES -->
<div class="panel active" id="tab-files">
  <div class="prompt"><span class="prompt-sym">$</span><span class="prompt-path">~/storage/files</span></div>
  <div class="hist-header">
    <span class="hist-title">storage</span>
    <div style="display:flex;gap:4px;align-items:center;">
      <span id="cache-sz" style="color:var(--text3);font-size:10px;cursor:pointer" onclick="showCacheInfo()"></span>
      <button onclick="clearCache()" style="font-size:10px;padding:3px 7px">🗑 cache</button>
      <button class="red" onclick="clearHistory()" style="font-size:10px;padding:3px 7px">rm -rf</button>
    </div>
  </div>
  <div id="hist-list-wrap"></div>
  <div class="log" id="f-log"><span class="if">ready</span></div>
</div>

<!-- UPLOAD -->
<div class="panel" id="tab-send">
  <div class="prompt"><span class="prompt-sym">$</span><span class="prompt-path">~/storage/upload</span></div>
  <div class="drop" id="sd">
    <input type="file" id="sf">
    <div class="drop-ico">⬡</div>
    <h3>DROP FILE OR CLICK TO BROWSE</h3>
    <p>any format · any size</p>
  </div>
  <div class="badge" id="sb"><span class="fn" id="sfn"></span><span class="fs" id="sfs"></span></div>
  <div class="stats4" id="ss" style="display:none">
    <div class="stat"><div class="sl">SIZE</div><div class="sv" id="s1">—</div></div>
    <div class="stat"><div class="sl">ENCODED</div><div class="sv" id="s2">—</div></div>
    <div class="stat"><div class="sl">CHUNKS</div><div class="sv" id="s3">—</div></div>
    <div class="stat"><div class="sl">PER CHUNK</div><div class="sv" id="s4">—</div></div>
  </div>
  <div class="brow">
    <button class="pri" id="sbtn" onclick="doSend()" disabled>▲ store</button>
    <button onclick="clearS()">✕ clear</button>
  </div>
  <div class="pw" id="spw"><div class="pbg"><div class="pb" id="spb"></div></div><div class="pl" id="spl"></div></div>
  <div class="log" id="s-log"><span class="if">ready</span></div>
</div>

<script>

// CLOCK
setInterval(()=>{ document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8); },1000);
document.getElementById('clock').textContent=new Date().toTimeString().slice(0,8);

// ── CONFIG ──
const BOTS = [
  '7137668641:AAHH711HV5qwOVLwIxLzcV4-SrxWjPsc0-4',
  '8662131980:AAHVTVhJgDsFYYUon_pjojUil14DShIg8Fg',
  '8781629308:AAGYcuvi19873RVPijKpp7ZQ3rFaftKsTQE',
  '8651255722:AAGnoC0ux2ZhyaSJpCX1ufjd6VdbTCACbbI',
  '8787829128:AAH0eUsRotiretkbk9IbSOiSPHNCBpOmzaU',
];
const TOKEN = BOTS[0];
const CF_PROXY = 'https://black-flower-58e6.artemurg19.workers.dev';
const FB_URL   = 'https://sinzenegithubio-default-rtdb.europe-west1.firebasedatabase.app/catalog.json';

// ── INDEXEDDB CACHE (no size limit unlike localStorage) ──
const IDB_NAME = 'telehex', IDB_STORE = 'parts', IDB_VER = 1;
let _idb = null;

function idbOpen() {
  if (_idb) return Promise.resolve(_idb);
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => { _idb = e.target.result; res(_idb); };
    req.onerror = e => rej(e.target.error);
  });
}

async function idbSet(key, value) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(value, key);
      tx.oncomplete = () => res(true);
      tx.onerror = e => rej(e.target.error);
    });
  } catch(e) { console.warn('idbSet failed:', e); return false; }
}

async function idbGet(key) {
  try {
    const db = await idbOpen();
    return new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readonly');
      const req = tx.objectStore(IDB_STORE).get(key);
      req.onsuccess = e => res(e.target.result ?? null);
      req.onerror = e => rej(e.target.error);
    });
  } catch(e) { return null; }
}

async function idbDel(key) {
  try {
    const db = await idbOpen();
    return new Promise((res) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).delete(key);
      tx.oncomplete = () => res(true);
    });
  } catch(e) { return false; }
}
async function idbClear() {
  try {
    const db = await idbOpen();
    return new Promise(res => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).clear();
      tx.oncomplete = () => res(true);
    });
  } catch(e) { return false; }
}
async function idbSize() {
  try {
    const db = await idbOpen();
    return new Promise(res => {
      const req = db.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).getAll();
      req.onsuccess = e => res(e.target.result.reduce((s,v)=>s+(v?v.length:0),0));
      req.onerror = ()=>res(0);
    });
  } catch(e) { return 0; }
}
const CHAT  = '-1002111265726';
const BYTES_PER_FILE = 9 * 1024 * 1024; // 9MB data = 18MB hex, under TG 20MB getFile limit
const PARALLEL_PER_BOT = 4;
const PARALLEL = BOTS.length * PARALLEL_PER_BOT;
// ── TABS ──
function sw(id) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', ['files','send'][i]===id));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  if (id==='files') loadAndRender();
}

// ── UTILS ──
const fmtSz = b => b<1024?b+' B':b<1<<20?(b>>10)+' KB':b<1<<30?(b/1048576).toFixed(1)+' MB':(b/1073741824).toFixed(2)+' GB';
const sleep = ms => new Promise(r=>setTimeout(r,ms));
const fmtDate = ts => new Date(ts).toLocaleString();

function lg(id, cls, msg) {
  const el = document.getElementById(id+'-log');
  const d = document.createElement('div');
  d.innerHTML = `<span class="${cls}">[${new Date().toTimeString().slice(0,8)}] ${msg}</span>`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function prg(id, pct, lbl) {
  document.getElementById(id+'pw').classList.add('on');
  document.getElementById(id+'pb').style.width = pct+'%';
  document.getElementById(id+'pl').textContent = lbl;
}

// ── FIREBASE CATALOG ──
let _catalog = [];

async function fbRead() {
  try {
    const r = await fetch(FB_URL);
    if (!r.ok) return [];
    const d = await r.json();
    if (!d) return [];
    return Array.isArray(d) ? d : Object.values(d).sort((a,b)=>b.ts-a.ts);
  } catch(e) { return []; }
}

async function fbWrite(entries) {
  try {
    const r = await fetch(FB_URL, {
      method:'PUT', headers:{'Content-Type':'application/json'},
      body: JSON.stringify(entries)
    });
    return r.ok;
  } catch(e) { return false; }
}

async function loadAndRender() {
  const wrap = document.getElementById('hist-list-wrap');
  wrap.innerHTML = '<div class="hist-empty" style="color:#555;font-size:11px">Loading...</div>';
  _catalog = await fbRead();
  renderList(_catalog);
}

async function addToHistory(entry) {
  _catalog.unshift(entry);
  await fbWrite(_catalog);
}

async function removeFromHistory(id) {
  const entry = _catalog.find(e=>e.id===id);
  if(!entry||!confirm('Delete?')) return;
  for(let i=0;i<(entry.parts||0);i++) idbDel(`th_${entry.startId}_${i}`);
  _catalog = _catalog.filter(e=>e.id!==id);
  await fbWrite(_catalog);
  renderList(_catalog);
}

async function clearHistory() {
  if(!confirm('Delete ALL files?')) return;
  _catalog = [];
  await fbWrite([]);
  renderList([]);
}

function renderList(entries) {
  const wrap = document.getElementById('hist-list-wrap');
  if (!entries.length) {
    wrap.innerHTML = '<div class="hist-empty">No files yet. Go to ▲ Upload to send files.</div>';
    return;
  }
  wrap.innerHTML = '';
  const list = document.createElement('div');
  list.className = 'hist-list';
  entries.forEach(entry => {
    const item = document.createElement('div');
    item.className = 'hist-item';
    item.style.gridTemplateColumns = '1fr auto auto auto';
    item.id = 'hi-'+entry.id;
    item.innerHTML = `
      <div class="hi-info">
        <div class="hi-name" title="${esc(entry.name)}">${esc(entry.name)}</div>
        <div class="hi-meta">
          <span>${fmtSz(entry.size)}</span>
          <span>${entry.parts} part(s)</span>
          <span class="mid">ID:${entry.startId}</span>
          <span>${fmtDate(entry.ts)}</span>
        </div>
        <div class="hi-prog" id="hp-${entry.id}">
          <div class="hi-pbg"><div class="hi-pb" id="hpb-${entry.id}"></div></div>
          <div class="hi-pl" id="hpl-${entry.id}"></div>
        </div>
      </div>
      <div class="hi-status done">✓</div>
      <button class="hi-btn pri" onclick="downloadEntry('${entry.id}')">▼ Download</button>
      <button class="hi-btn red" onclick="removeFromHistory('${entry.id}')">✕</button>
    `;
    list.appendChild(item);
  });
  wrap.appendChild(list);
}

function setEntryPrg(id, pct, lbl) {
  const pw = document.getElementById('hp-'+id);
  const pb = document.getElementById('hpb-'+id);
  const pl = document.getElementById('hpl-'+id);
  if(!pw) return;
  pw.classList.add('on');
  pb.style.width = pct+'%';
  pl.textContent = lbl;
}

// ── TELEGRAM ──
async function tgJSON(method, body, tok=TOKEN) {
  for (let t=0; t<5; t++) {
    try {
      const r = await fetch(`https://api.telegram.org/bot${tok}/${method}`, {
        method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)
      });
      const d = await r.json();
      if (d.ok) return d;
      if (d.error_code===429) await sleep(((d.parameters?.retry_after||3)+1)*1000);
      else return d;
    } catch(e) { await sleep(1000); }
  }
  return {ok:false, description:'max retries'};
}

async function tgSendDoc(chatId, filename, hexStr, caption, tok=TOKEN) {
  // Encode hex string to UTF-8 bytes explicitly
  const encoder = new TextEncoder();
  const bytes = encoder.encode(hexStr);
  const blob = new Blob([bytes], {type:'text/plain; charset=utf-8'});

  for (let t=0; t<5; t++) {
    try {
      // Create fresh FormData each retry (consumed after first use)
      const form = new FormData();
      form.append('chat_id', chatId);
      form.append('document', blob, filename);
      if (caption) form.append('caption', caption);
      form.append('disable_notification','true');
      const r = await fetch(`https://api.telegram.org/bot${tok}/sendDocument`, {method:'POST', body:form});
      const d = await r.json();
      if (d.ok) return d;
      if (d.error_code===429) {
        const wait = ((d.parameters?.retry_after||3)+1)*1000;
        await sleep(wait);
      } else {
        console.error('sendDocument error:', d);
        return d;
      }
    } catch(e) {
      console.error('sendDocument exception:', e);
      await sleep(1000);
    }
  }
  return {ok:false, description:'max retries'};
}

async function fwdRead(chatId, msgId) {
  const r = await tgJSON('forwardMessage',{chat_id:chatId,from_chat_id:chatId,message_id:msgId});
  if (!r.ok) return null;
  tgJSON('deleteMessage',{chat_id:chatId,message_id:r.result.message_id});
  return r.result;
}

async function downloadTgFile(fileId, startId, partIdx) {
  // 1. Check IndexedDB cache
  const cacheKey = `th_${startId}_${partIdx}`;
  const cached = await idbGet(cacheKey);
  if (cached && cached.length > 0) {
    lgAny('ok', `Part ${partIdx+1}: cache hit`);
    return cached;
  }
  // 2. Get file path then download via CF Worker (solves CORS)
  lgAny('if', `Part ${partIdx+1}: fetching...`);
  const r = await tgJSON('getFile', {file_id: fileId});
  if (!r.ok) { lgAny('er', `getFile: ${r.description}`); return null; }
  const url = `${CF_PROXY}/file/bot${TOKEN}/${r.result.file_path}`;
  try {
    const resp = await fetch(url);
    if (!resp.ok) { lgAny('er', `HTTP ${resp.status}`); return null; }
    const text = await resp.text();
    if (!text || text.length < 4) { lgAny('er', 'Empty response'); return null; }
    idbSet(cacheKey, text.trim());
    lgAny('ok', `Part ${partIdx+1}: ok (${(text.length/2/1024).toFixed(0)} KB)`);
    return text.trim();
  } catch(e) { lgAny('er', `Fetch error: ${e.message}`); return null; }
}

// Log to whichever log panel is visible
function lgAny(cls, msg) {
  const id = document.getElementById('tab-files').classList.contains('active') ? 'f' : 'r';
  lg(id, cls, msg);
}

// ── SEND ──
let sFile = null;

const sdEl = document.getElementById('sd');
sdEl.addEventListener('dragover', e=>{e.preventDefault();sdEl.classList.add('drag');});
sdEl.addEventListener('dragleave', ()=>sdEl.classList.remove('drag'));
sdEl.addEventListener('drop', e=>{e.preventDefault();sdEl.classList.remove('drag');if(e.dataTransfer.files[0])setF(e.dataTransfer.files[0]);});
document.getElementById('sf').addEventListener('change', e=>{if(e.target.files[0])setF(e.target.files[0]);});

function setF(f) {
  sFile=f;
  document.getElementById('sb').classList.add('on');
  document.getElementById('sfn').textContent=f.name;
  document.getElementById('sfs').textContent=fmtSz(f.size);
  document.getElementById('sbtn').disabled=false;
  const nf=Math.ceil(f.size/BYTES_PER_FILE);
  document.getElementById('ss').style.display='grid';
  document.getElementById('s1').textContent=fmtSz(f.size);
  document.getElementById('s2').textContent=fmtSz(f.size*2) + ' hex';
  document.getElementById('s3').textContent=nf;
  document.getElementById('s4').textContent=fmtSz(Math.min(BYTES_PER_FILE,f.size)*2);
}

function clearS() {
  sFile=null;
  document.getElementById('sb').classList.remove('on');
  document.getElementById('ss').style.display='none';
  document.getElementById('sbtn').disabled=true;
  document.getElementById('spw').classList.remove('on');
  document.getElementById('sf').value='';
  document.getElementById('s-log').innerHTML='<span class="if">cleared</span>';
}

async function doSend() {
  if (!sFile) {lg('s','er','No file');return;}
  const btn=document.getElementById('sbtn');
  btn.disabled=true;

  const total=sFile.size;
  const numFiles=Math.ceil(total/BYTES_PER_FILE);
  lg('s','if',`${sFile.name} | ${fmtSz(total)} | ${numFiles} part(s)`);

  // Header
  prg('s',0,'Sending header...');
  const hdr={v:'2',n:sFile.name,s:total,tf:numFiles};
  const hr=await tgJSON('sendMessage',{
    chat_id:CHAT, text:'TELEHEX2_HDR\n'+JSON.stringify(hdr), disable_notification:true
  });
  if (!hr.ok){lg('s','er','Header failed: '+hr.description);btn.disabled=false;return;}
  const startId=hr.result.message_id;
  lg('s','ok',`Header sent. Start Msg ID = ${startId}`);

  const t0=Date.now(); let sent=0;
  const fileIds=new Array(numFiles).fill(null);

  // Build ASCII lookup table once
  const ascii = new Uint8Array(512);
  for(let x=0;x<256;x++){
    const h=x.toString(16).padStart(2,'0');
    ascii[x*2]=h.charCodeAt(0); ascii[x*2+1]=h.charCodeAt(1);
  }

  // Helper: read file slice → Uint8Array
  const readSlice = (s,e) => new Promise((res,rej)=>{
    const fr=new FileReader();
    fr.onload=ev=>res(new Uint8Array(ev.target.result));
    fr.onerror=rej;
    fr.readAsArrayBuffer(sFile.slice(s,e));
  });

  // Helper: bytes → hex string (fast, no GC pressure)
  const toHex = buf => {
    const out = new Uint8Array(buf.length*2);
    for(let j=0;j<buf.length;j++){ out[j*2]=ascii[buf[j]*2]; out[j*2+1]=ascii[buf[j]*2+1]; }
    return new TextDecoder().decode(out);
  };

  // Multi-bot parallel upload, sequential RAM-safe read
  const botActive=BOTS.map(()=>0), botQueue=BOTS.map(()=>[]);
  const botSem=b=>new Promise(r=>{if(botActive[b]<PARALLEL_PER_BOT){botActive[b]++;r();}else botQueue[b].push(r);});
  const botRel=b=>{botActive[b]--;if(botQueue[b].length){botActive[b]++;botQueue[b].shift()();}};
  const pickBot=()=>{let b=0;for(let i=1;i<BOTS.length;i++)if(botActive[i]<botActive[b])b=i;return b;};
  lg('s','if',`${BOTS.length} bots x ${PARALLEL_PER_BOT} = ${PARALLEL} slots`);

  for(let i=0;i<numFiles;i++){
    const s=i*BYTES_PER_FILE, e=Math.min(s+BYTES_PER_FILE,total);
    const buf=await readSlice(s,e);
    const hexStr=toHex(buf);
    const b=pickBot(); await botSem(b);
    idbSet(`th_${startId}_${i}`, hexStr);
    (async(idx,hs,bs,be,bi)=>{
      try {
        const r=await tgSendDoc(CHAT,`telehex_${idx+1}_of_${numFiles}.txt`,hs,`TELEHEX2_PART ${idx+1}/${numFiles}`,BOTS[bi]);
        if(!r.ok) lg('s','er',`Part ${idx+1} failed: ${r.description}`);
        else {
          fileIds[idx]=r.result.document.file_id;
          sent++;
          const spd=fmtSz(Math.round((sent*BYTES_PER_FILE)/((Date.now()-t0)/1000||0.001)));
          prg('s',5+Math.round((sent/numFiles)*88),`${sent}/${numFiles} — ${spd}/s`);
          if(sent===1||sent%5===0||sent===numFiles) lg('s','ok',`Part ${idx+1}/${numFiles} ✓`);
        }
      } finally{botRel(bi);}
    })(i,hexStr,s,e,b);
  }
  while(botActive.some(a=>a>0)) await sleep(50);

  // Footer
  await tgJSON('sendMessage',{
    chat_id:CHAT,
    text:`TELEHEX2_END start:${startId} parts:${numFiles} name:${sFile.name}`,
    disable_notification:true
  });

  await addToHistory({
    id: String(startId),
    startId,
    name: sFile.name,
    size: total,
    parts: numFiles,
    fileIds,
    ts: Date.now()
  });

  const elapsed=((Date.now()-t0)/1000).toFixed(1);
  prg('s',100,'Done!');
  localStorage.setItem('th_last_upload', Date.now());
  lg('s','ok',`✅ Done in ${elapsed}s.`);
  // lg('s','ok',`📌 Switch to 📁 Files tab to download it anytime.`);
  btn.disabled=false;

  // Auto-switch to files tab
  setTimeout(()=>sw('files'), 1200);
}

// ── DOWNLOAD (restore) ──
let downloading = new Set();

async function downloadEntry(entryId) {
  if (downloading.has(entryId)) return;
  downloading.add(entryId);

  const entry = _catalog.find(e=>e.id===String(entryId));
  if (!entry){lg('f','er','Entry not found');downloading.delete(entryId);return;}

  const {startId, name, size, parts, fileIds} = entry;
  lg('f','if',`Restoring: ${name} (${fmtSz(size)}, ${parts} part(s))...`);

  if (!fileIds || !fileIds.every(Boolean)) {
    lg('f','er','No fileIds in catalog');
    downloading.delete(entryId); return;
  }
  const t0=Date.now();

  // Hex decode lookup
  const lut=new Uint8Array(103);
  for(let i=0;i<10;i++) lut[48+i]=i;
  for(let i=0;i<6;i++){lut[65+i]=10+i; lut[97+i]=10+i;}

  const hexToU8 = hex => {
    const b=new Uint8Array(hex.length>>1);
    for(let i=0;i<b.length;i++) b[i]=(lut[hex.charCodeAt(i*2)]<<4)|lut[hex.charCodeAt(i*2+1)];
    return b;
  };

  try {
    const fileStream = window.streamSaver.createWriteStream(name, {size});
    const writer = fileStream.getWriter();
    let prefetched = downloadTgFile(fileIds[0], startId, 0);
    for(let i=0;i<parts;i++){
      const data = await prefetched;
      if(!data){ writer.abort(); lg('f','er',`Part ${i+1} failed`); downloading.delete(entryId); return; }
      if(i+1<parts) prefetched = downloadTgFile(fileIds[i+1], startId, i+1);
      const hex = (typeof data==='string' ? data : new TextDecoder().decode(data)).replace(/\s/g,'');
      await writer.write(hexToU8(hex));
      const spd=fmtSz(Math.round(((i+1)*BYTES_PER_FILE)/((Date.now()-t0)/1000||0.001)));
      setEntryPrg(entryId,Math.round(((i+1)/parts)*95),`${i+1}/${parts} — ${spd}/s`);
      lg('f','ok',`Part ${i+1}/${parts} ok`);
    }
    await writer.close();
  } catch(e) {
    lg('f','er','Download error: '+e.message);
    downloading.delete(entryId); return;
  }

  setEntryPrg(entryId,100,'Done!');
  lg('f','ok',`✅ ${name} (${fmtSz(size)}) in ${((Date.now()-t0)/1000).toFixed(1)}s`);
  downloading.delete(entryId);
  // Auto-delete cache for this entry after download (free disk space)
  for(let i=0;i<parts;i++) idbDel(`th_${startId}_${i}`);
  updateCacheSize();

// Auto-clear stale cache on startup (older than 24h)
(async () => {
  const lastUpload = parseInt(localStorage.getItem('th_last_upload') || '0');
  const age = Date.now() - lastUpload;
  if (lastUpload && age > 24 * 60 * 60 * 1000) {
    const sz = await idbSize();
    if (sz > 0) {
      await idbClear();
      localStorage.removeItem('th_last_upload');
      updateCacheSize();
      console.log('Auto-cleared stale cache:', sz, 'bytes');
    }
  }
})();
}



function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ── INIT ──
loadAndRender();
// cache size display
async function showCacheInfo(){const s=await idbSize();lg('f','if',`Cache: ${fmtSz(s)}`);}
async function clearCache(){const s=await idbSize();if(!s){lg('f','if','Cache empty');return;}if(!confirm(`Clear ${fmtSz(s)} cache?`))return;await idbClear();lg('f','ok','Cache cleared');updateCacheSize();}
async function updateCacheSize(){const s=await idbSize();const el=document.getElementById('cache-sz');if(el)el.textContent=s>0?fmtSz(s):'';}
updateCacheSize();
</script>
